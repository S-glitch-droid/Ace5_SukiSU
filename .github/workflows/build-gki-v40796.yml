name: Build GKI v40796
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache && sudo docker image prune -a -f || true && sudo apt clean
      - run: git config --global user.name "build" && git config --global user.email "build@build.com" && sudo apt update -y && sudo apt install -y python3 git curl bc bison flex libssl-dev make
      - run: curl -LSs https://storage.googleapis.com/git-repo-downloads/repo > ~/repo && chmod a+x ~/repo && sudo mv ~/repo /usr/local/bin/repo
      - name: Sync source
        run: mkdir kw && cd kw && repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b refs/heads/oneplus/sm8650 -m oneplus_ace5.xml --depth=1 && repo sync
      - name: Setup SukiSU
        run: cd kw/kernel_platform && curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash && cd KernelSU && KSU_VER=$(expr $(git rev-list --count main) "+" 10606) && echo "KSUVER=$KSU_VER" >> $GITHUB_ENV && sed -i "s/DKSU_VERSION=12800/DKSU_VERSION=${KSU_VER}/" kernel/Makefile
      - name: Build
        run: cd kw && LTO=thin SYSTEM_DLKM_RE_SIGN=0 BUILD_SYSTEM_DLKM=0 KMI_SYMBOL_LIST_STRICT_MODE=0 ./kernel_platform/oplus/build/oplus_build_kernel.sh kalama gki
      - name: Upload
        run: img=$(find "$(pwd)" -name "Image" -type f | head -1) && mkdir -p output && cp "$$img" output/Image
      - uses: actions/upload-artifact@v4
        with:
          name: GKI_Image
          path: output/*